name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build
        run: node esbuild.config.mjs production

      - name: Verify output
        run: |
          if [ ! -f main.js ]; then
            echo "Build failed: main.js not found"
            exit 1
          fi
          echo "Build succeeded. Output size: $(du -sh main.js | cut -f1)"
