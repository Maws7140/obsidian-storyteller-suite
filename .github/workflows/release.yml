name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.7.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

env:
  PLUGIN_NAME: storyteller-suite

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Update version files
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          
          # Read current minAppVersion from manifest.json
          CURRENT_MIN_APP=$(node -e "const m=require('./manifest.json'); console.log(m.minAppVersion)")
          
          # Keep the current minAppVersion unless it is changed intentionally in manifest.json
          NEW_MIN_APP="$CURRENT_MIN_APP"
          
          # Update package.json version
          npm version $VERSION --no-git-tag-version
          
          # Update manifest.json version and minAppVersion
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            manifest.minAppVersion = '$NEW_MIN_APP';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, '\t') + '\n');
          "
          
          # Update versions.json with new version
          node -e "
            const fs = require('fs');
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions['$VERSION'] = '$NEW_MIN_APP';
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
          "
          
          # Update CHANGELOG.md
          if [ -n "${{ inputs.release_notes }}" ]; then
            node -e "
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const notes = \`${{ inputs.release_notes }}\`.replace(/\`/g, '\\`');
              const newEntry = \`## $VERSION\n\n\${notes}\n\n\`;
              const updated = changelog.replace(/^# Changelog\n\n/, \`# Changelog\n\n\${newEntry}\`);
              fs.writeFileSync('CHANGELOG.md', updated);
            "
          else
            node -e "
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const newEntry = \`## $VERSION\n\n_Release notes to be added_\n\n\`;
              const updated = changelog.replace(/^# Changelog\n\n/, \`# Changelog\n\n\${newEntry}\`);
              fs.writeFileSync('CHANGELOG.md', updated);
            "
          fi
          
          # Display updated files for verification
          echo "Updated files:"
          cat package.json | grep '"version"'
          cat manifest.json | grep '"version"'
          tail -3 versions.json

      - name: Type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Verify build artifacts
        run: |
          if [ ! -f "main.js" ]; then
            echo "Error: main.js not found after build"
            exit 1
          fi
          if [ ! -f "manifest.json" ]; then
            echo "Error: manifest.json not found"
            exit 1
          fi
          if [ ! -f "styles.css" ]; then
            echo "Warning: styles.css not found"
          fi

      - name: Create release package
        run: |
          mkdir -p ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json ${{ env.PLUGIN_NAME }}/
          if [ -f "styles.css" ]; then
            cp styles.css ${{ env.PLUGIN_NAME }}/
          fi
          zip -r ${{ env.PLUGIN_NAME }}-${{ steps.release_meta.outputs.version }}.zip ${{ env.PLUGIN_NAME }}/
          ls -lh ${{ env.PLUGIN_NAME }}-${{ steps.release_meta.outputs.version }}.zip

      - name: Commit and tag version changes
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json manifest.json versions.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.release_meta.outputs.version }}" || exit 0
          
          # Create and push tag
          git tag -a "${{ steps.release_meta.outputs.version }}" -m "Release ${{ steps.release_meta.outputs.version }}"
          git push origin HEAD || true
          git push origin "${{ steps.release_meta.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.version }}
          name: Release ${{ steps.release_meta.outputs.version }}
          body: |
            ## Changes in ${{ steps.release_meta.outputs.version }}
            
            ${{ inputs.release_notes || 'See CHANGELOG.md for details.' }}
            
            ## Installation
            
            1. Download the `${{ env.PLUGIN_NAME }}-${{ steps.release_meta.outputs.version }}.zip` file
            2. Extract it to your Obsidian vault's `.obsidian/plugins/${{ env.PLUGIN_NAME }}/` folder
            3. Restart Obsidian or reload the plugin
            
            ## Files
            
            - `main.js` - Main plugin file
            - `manifest.json` - Plugin manifest
            - `styles.css` - Plugin styles (if present)
          files: |
            ${{ env.PLUGIN_NAME }}-${{ steps.release_meta.outputs.version }}.zip
            main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false

