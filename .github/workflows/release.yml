name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.7.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  PLUGIN_NAME: storyteller-suite

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_notes }}" ]; then
            {
              echo "body<<EOF"
              echo "${{ inputs.release_notes }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${{ steps.release_meta.outputs.version }}"
          NOTES="$(awk -v version="$VERSION" '
            $0 ~ "^## " version "$" { capture=1; next }
            capture && $0 ~ "^## " { exit }
            capture { print }
          ' CHANGELOG.md)"

          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi

          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Update version files
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          
          # Read current minAppVersion from manifest.json
          CURRENT_MIN_APP=$(node -e "const m=require('./manifest.json'); console.log(m.minAppVersion)")
          
          # Keep the current minAppVersion unless it is changed intentionally in manifest.json
          NEW_MIN_APP="$CURRENT_MIN_APP"
          
          # Update package.json version
          npm version $VERSION --no-git-tag-version
          
          # Update manifest.json version and minAppVersion
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            manifest.minAppVersion = '$NEW_MIN_APP';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, '\t') + '\n');
          "
          
          # Update versions.json with new version
          node -e "
            const fs = require('fs');
            const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            versions['$VERSION'] = '$NEW_MIN_APP';
            fs.writeFileSync('versions.json', JSON.stringify(versions, null, '\t') + '\n');
          "
          
          # Update CHANGELOG.md
          if [ -n "${{ inputs.release_notes }}" ]; then
            node -e "
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const notes = \`${{ inputs.release_notes }}\`.replace(/\`/g, '\\`');
              const newEntry = \`## $VERSION\n\n\${notes}\n\n\`;
              const updated = changelog.replace(/^# Changelog\n\n/, \`# Changelog\n\n\${newEntry}\`);
              fs.writeFileSync('CHANGELOG.md', updated);
            "
          else
            node -e "
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const newEntry = \`## $VERSION\n\n_Release notes to be added_\n\n\`;
              const updated = changelog.replace(/^# Changelog\n\n/, \`# Changelog\n\n\${newEntry}\`);
              fs.writeFileSync('CHANGELOG.md', updated);
            "
          fi
          
          # Display updated files for verification
          echo "Updated files:"
          cat package.json | grep '"version"'
          cat manifest.json | grep '"version"'
          tail -3 versions.json

      - name: Verify version matches tag
        shell: bash
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")

          echo "Release ref/version: $VERSION"
          echo "manifest.json:       $MANIFEST_VERSION"
          echo "package.json:        $PACKAGE_VERSION"

          if [ "$MANIFEST_VERSION" != "$VERSION" ] || [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch — manifest.json ($MANIFEST_VERSION) and package.json ($PACKAGE_VERSION) must both equal the release version ($VERSION)."
            echo "If this was a manual tag push, the tag was likely created on a commit before the version bump. Re-tag the bump commit (or use the workflow_dispatch release flow)."
            exit 1
          fi

          if ! node -e "const v=require('./versions.json'); process.exit(v['$VERSION'] ? 0 : 1)"; then
            echo "::error::versions.json has no entry for $VERSION. Add it before releasing."
            exit 1
          fi

      - name: Type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Verify build artifacts
        run: |
          if [ ! -f "main.js" ]; then
            echo "Error: main.js not found after build"
            exit 1
          fi
          if [ ! -f "manifest.json" ]; then
            echo "Error: manifest.json not found"
            exit 1
          fi
          if [ ! -f "styles.css" ]; then
            echo "Warning: styles.css not found"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Commit and tag version changes
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json manifest.json versions.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.release_meta.outputs.version }}" || exit 0
          
          # Create and push tag
          git tag -a "${{ steps.release_meta.outputs.version }}" -m "Release ${{ steps.release_meta.outputs.version }}"
          git push origin HEAD || true
          git push origin "${{ steps.release_meta.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.version }}
          name: Release ${{ steps.release_meta.outputs.version }}
          body: |
            ## Changes in ${{ steps.release_meta.outputs.version }}

            ${{ steps.release_notes.outputs.body }}

            ## Installation

            Download `main.js`, `manifest.json`, and `styles.css` into your
            vault's `.obsidian/plugins/${{ env.PLUGIN_NAME }}/` folder and reload Obsidian.

            ## Files

            - `main.js` - Main plugin file
            - `manifest.json` - Plugin manifest
            - `styles.css` - Plugin styles
          files: |
            main.js
            manifest.json
            styles.css
          draft: false
          prerelease: ${{ contains(steps.release_meta.outputs.version, '-') }}

