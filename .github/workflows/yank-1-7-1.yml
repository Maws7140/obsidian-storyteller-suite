name: Yank 1.7.1

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  yank:
    if: contains(github.event.head_commit.message, '[yank-1.7.1]')
    runs-on: ubuntu-latest
    steps:
      - name: Delete release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '1.7.1';

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`Deleted release ${tag}`);
            } catch (error) {
              core.info(`Release ${tag} not deleted: ${error.message}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted tag ${tag}`);
            } catch (error) {
              core.info(`Tag ${tag} not deleted: ${error.message}`);
            }
